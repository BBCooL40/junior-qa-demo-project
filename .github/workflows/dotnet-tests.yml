name: .NET NUnit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run NUnit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore automation/JuniorQaDemo.Tests/JuniorQaDemo.Tests.csproj

      - name: Build
        run: dotnet build automation/JuniorQaDemo.Tests/JuniorQaDemo.Tests.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test automation/JuniorQaDemo.Tests/JuniorQaDemo.Tests.csproj --configuration Release --no-build --verbosity normal